<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3600">
  <title>自动驾驶新闻聚合 | Auto Driving News</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 0; color: white; }
    header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    header p { font-size: 1.1rem; opacity: 0.8; }
    .meta { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
    .meta span { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; }
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 30px; }
    .news-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: all 0.3s; cursor: pointer; }
    .news-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .source { font-size: 0.75rem; padding: 5px 14px; border-radius: 15px; font-weight: 600; background: #e3f2fd; color: #1976d2; }
    .date { font-size: 0.85rem; color: #999; }
    .title { font-size: 1.15rem; font-weight: 600; color: #333; margin-bottom: 10px; line-height: 1.4; }
    .summary { font-size: 0.95rem; color: #666; line-height: 1.6; }
    .stats { text-align: center; color: white; margin-bottom: 20px; font-size: 1.1rem; }
    footer { text-align: center; padding: 40px 0; color: rgba(255,255,255,0.6); margin-top: 40px; }
    @media (max-width: 768px) { header h1 { font-size: 1.8rem; } .news-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚗 自动驾驶新闻聚合</h1>
      <p>全网自动驾驶行业动态追踪</p>
      <div class="meta">
        <span>⏰ 每日 8:00 更新</span>
        <span>🤖 自动抓取</span>
        <span id="last-update">加载中...</span>
      </div>
    </header>
    <div class="stats">共 <strong id="news-count">0</strong> 条新闻</div>
    <div class="news-grid" id="news-grid"></div>
    <footer>
      <p>Auto Driving News © 2026 | 自动聚合 · 实时更新</p>
    </footer>
  </div>
  <script>
    fetch('news.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById('last-update').textContent = '📅 ' + data.lastUpdated;
        document.getElementById('news-count').textContent = data.news.length;
        document.getElementById('news-grid').innerHTML = data.news.map(item => 
          '<article class="news-card" onclick="window.open(\'' + item.url + '\',\'_blank\')">' +
            '<div class="card-header">' +
              '<span class="source">' + item.source + '</span>' +
              '<span class="date">' + item.date + '</span>' +
            '</div>' +
            '<h3 class="title">' + item.title + '</h3>' +
            '<p class="summary">' + item.summary + '</p>' +
          '</article>'
        ).join('');
      })
      .catch(err => {
        document.getElementById('news-grid').innerHTML = '<div style="color:white;text-align:center;">加载失败，请稍后刷新</div>';
      });
  </script>
</body>
</html>
